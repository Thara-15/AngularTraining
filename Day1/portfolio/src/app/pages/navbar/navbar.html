<nav class="glass-nav">
  <div class="nav-inner">
    <!-- Brand -->
    <div class="brand" (click)="scrollTo('home')">
      {{ brand }}
    </div>

    <!-- Navigation links -->
    <ul class="nav-list">
      <li *ngFor="let link of navLinks" class="nav-item">
        <a
          [class.active]="isActive(link.id)"
          (click)="scrollTo(link.id)"
        >
          {{ link.label }}
        </a>
      </li>
    </ul>
  </div>
</nav>
